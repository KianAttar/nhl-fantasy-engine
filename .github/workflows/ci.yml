name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-secret-key
      ALLOWED_HOSTS: localhost
      DATABASE_URL: sqlite:///test.db
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run python manage.py test apps.core --verbosity=2
