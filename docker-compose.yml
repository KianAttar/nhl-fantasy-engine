services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nhl_fantasy
      POSTGRES_USER: nhl
      POSTGRES_PASSWORD: nhl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nhl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4", "--timeout", "60"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://nhl:nhl@postgres:5432/nhl_fantasy
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  worker:
    build: .
    command: ["celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=2"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://nhl:nhl@postgres:5432/nhl_fantasy
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: ["sh", "-c", "python manage.py setup_schedule && celery -A config beat --loglevel=info"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://nhl:nhl@postgres:5432/nhl_fantasy
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
